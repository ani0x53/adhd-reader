<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }

    h1 {
      font-size: 16px;
      text-align: center;
      margin-bottom: 16px;
      color: #fff;
    }

    .feature {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #2a2a4a;
    }

    .feature:last-child { border-bottom: none; }

    .feature-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .feature-name {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
    }

    .feature-desc {
      font-size: 11px;
      color: #888;
    }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle .slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked + .slider {
      background: #6c5ce7;
    }

    .toggle input:checked + .slider::before {
      transform: translateX(18px);
    }

    .settings-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }

    .settings-row label {
      font-size: 11px;
      color: #888;
    }

    .settings-row input[type="color"] {
      width: 24px;
      height: 24px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      background: none;
    }

    .api-section {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #2a2a4a;
    }

    .api-section label {
      font-size: 11px;
      color: #888;
      display: block;
      margin-bottom: 4px;
    }

    .api-section input[type="password"] {
      width: 100%;
      padding: 6px 8px;
      font-size: 12px;
      background: #2a2a4a;
      border: 1px solid #3a3a5a;
      border-radius: 4px;
      color: #e0e0e0;
      outline: none;
    }

    .api-section input[type="password"]:focus {
      border-color: #6c5ce7;
    }

    .save-btn {
      margin-top: 6px;
      padding: 4px 12px;
      font-size: 11px;
      background: #6c5ce7;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .save-btn:hover { background: #5a4bd1; }

    .status {
      font-size: 11px;
      color: #4ecdc4;
      margin-top: 4px;
      display: none;
    }
  </style>
</head>
<body>
  <h1>ADHD Reading Assistant</h1>

  <div class="feature">
    <div class="feature-info">
      <span class="feature-name">Bionic Reading</span>
      <span class="feature-desc">Bold first letters of words</span>
    </div>
    <label class="toggle">
      <input type="checkbox" id="bionic">
      <span class="slider"></span>
    </label>
  </div>

  <div class="feature">
    <div class="feature-info">
      <span class="feature-name">Line Focus</span>
      <span class="feature-desc">Dim everything except current line</span>
    </div>
    <label class="toggle">
      <input type="checkbox" id="lineFocus">
      <span class="slider"></span>
    </label>
  </div>

  <div class="feature">
    <div class="feature-info">
      <span class="feature-name">Sentence Highlighter</span>
      <span class="feature-desc">Click sentences to highlight</span>
    </div>
    <label class="toggle">
      <input type="checkbox" id="sentenceHighlight">
      <span class="slider"></span>
    </label>
  </div>

  <div class="feature">
    <div class="feature-info">
      <span class="feature-name">Reading Ruler</span>
      <span class="feature-desc">Horizontal line follows cursor</span>
      <div class="settings-row">
        <label>Color:</label>
        <input type="color" id="rulerColor" value="#3b82f6">
      </div>
    </div>
    <label class="toggle">
      <input type="checkbox" id="readingRuler">
      <span class="slider"></span>
    </label>
  </div>

  <div class="feature">
    <div class="feature-info">
      <span class="feature-name">Text Reformatter</span>
      <span class="feature-desc">Select text → simplify (requires API key below)</span>
    </div>
    <label class="toggle">
      <input type="checkbox" id="reformatter">
      <span class="slider"></span>
    </label>
  </div>

  <div class="api-section">
    <label>Claude API Key (optional — only needed for Text Reformatter)</label>
    <input type="password" id="apiKey" placeholder="sk-ant-...">
    <button class="save-btn" id="saveKey">Save Key</button>
    <div class="status" id="keyStatus">Key saved!</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
