<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }

    h1 {
      font-size: 16px;
      text-align: center;
      margin-bottom: 16px;
      color: #fff;
    }

    .feature {
      padding: 10px 0;
      border-bottom: 1px solid #2a2a4a;
    }

    .feature:last-child { border-bottom: none; }

    .feature-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .feature-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .feature-name {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
    }

    .feature-desc {
      font-size: 11px;
      color: #888;
    }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle .slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked + .slider {
      background: #6c5ce7;
    }

    .toggle input:checked + .slider::before {
      transform: translateX(18px);
    }

    .settings {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .setting {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .setting label {
      font-size: 11px;
      color: #888;
    }

    .setting input[type="range"] {
      width: 80px;
      height: 4px;
      accent-color: #6c5ce7;
    }

    .setting input[type="color"] {
      width: 22px;
      height: 22px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      background: none;
      padding: 0;
    }

    .setting .val {
      font-size: 11px;
      color: #6c5ce7;
      min-width: 16px;
      text-align: center;
    }

    .setting select {
      font-size: 11px;
      background: #2a2a4a;
      color: #e0e0e0;
      border: 1px solid #3a3a5a;
      border-radius: 4px;
      padding: 2px 4px;
      outline: none;
    }
  </style>
</head>
<body>
  <h1>ADHD Reading Assistant</h1>

  <div class="feature">
    <div class="feature-header">
      <div class="feature-info">
        <span class="feature-name">Finger Reading</span>
        <span class="feature-desc">Click a word, then ← → ↑ ↓ to read</span>
      </div>
      <label class="toggle">
        <input type="checkbox" id="fingerReading">
        <span class="slider"></span>
      </label>
    </div>
    <div class="settings">
      <div class="setting">
        <label>Words:</label>
        <input type="range" id="fingerWords" min="1" max="10" value="4">
        <span class="val" id="fingerWordsVal">4</span>
      </div>
    </div>
  </div>

  <div class="feature">
    <div class="feature-header">
      <div class="feature-info">
        <span class="feature-name">Line Reading</span>
        <span class="feature-desc">Click a line, then ↑ ↓ to read line by line</span>
      </div>
      <label class="toggle">
        <input type="checkbox" id="lineReading">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="feature">
    <div class="feature-header">
      <div class="feature-info">
        <span class="feature-name">Line Focus</span>
        <span class="feature-desc">Dims everything except current line</span>
      </div>
      <label class="toggle">
        <input type="checkbox" id="lineFocus">
        <span class="slider"></span>
      </label>
    </div>
    <div class="settings">
      <div class="setting">
        <label>Width:</label>
        <input type="range" id="lineWidth" min="10" max="80" value="28">
        <span class="val" id="lineWidthVal">28</span>
      </div>
    </div>
  </div>

  <div class="feature">
    <div class="feature-header">
      <div class="feature-info">
        <span class="feature-name">Bionic Reading</span>
        <span class="feature-desc">Bold first letters of every word</span>
      </div>
      <label class="toggle">
        <input type="checkbox" id="bionic">
        <span class="slider"></span>
      </label>
    </div>
    <div class="settings">
      <div class="setting">
        <label>Color:</label>
        <input type="color" id="bionicColor" value="#000000">
      </div>
      <div class="setting">
        <label>Weight:</label>
        <select id="bionicWeight">
          <option value="600">Semi-bold</option>
          <option value="700">Bold</option>
          <option value="800">Extra-bold</option>
          <option value="900" selected>Black</option>
        </select>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
